<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=prova.html">
<title>Simulado · Henrique Coimbra Mentoria</title>
<link rel="canonical" href="prova.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --grafite:#1A1A1F; --esmeralda:#047857; --marfim:#F8F7F4; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
    font-family:'Inter',system-ui,sans-serif;color:var(--marfim);
    background:radial-gradient(130% 130% at 50% -10%, #2A2A33 0%, #1A1A1F 62%, #141418 100%)}
  .card{text-align:center;max-width:380px}
  .hc{width:64px;height:64px;margin:0 auto 20px;color:var(--marfim)}
  .hc svg{display:block;width:100%;height:100%}
  .marca{font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:.32em;font-weight:500}
  .marca .seg{color:var(--esmeralda)}
  h1{font-family:'Manrope',sans-serif;font-size:24px;letter-spacing:.18em;margin:14px 0 8px;font-weight:700}
  p{margin:0 0 22px;color:#B6B6BF;font-size:14px}
  a.btn{display:inline-block;padding:13px 26px;border-radius:11px;background:var(--marfim);color:var(--grafite);
    text-decoration:none;font-weight:600;font-size:14.5px;font-family:'Manrope',sans-serif}
</style>
</head>
<body>
  <div class="card">
    <span class="hc"><svg viewBox="-45 -35 90 88" fill="none">
      <g stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <path d="M -36,-25 L -36,25"/><path d="M -16,-25 L -16,25"/><path d="M -36,0 L -16,0"/><path d="M 36,-11 A 22,22 0 1,0 36,11"/>
      </g>
      <g stroke="currentColor" stroke-width="0.7" stroke-linecap="round" opacity="0.9">
        <path d="M -30,33 L 30,33"/><path d="M -30,40 L 30,40"/><path d="M -30,47 L 30,47"/>
      </g>
    </svg></span>
    <div class="marca">HENRIQUE COIMBRA <span class="seg">· MENTORIA</span></div>
    <h1>SIMULADO</h1>
    <p>Redirecionando para a prova…</p>
    <a class="btn" href="prova.html">Entrar na prova</a>
  </div>
</body>
</html>
